name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Lint
        run: npm run lint
        working-directory: client

      - name: Test
        run: npm test
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: client/dist/
          retention-days: 1

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # --- Railway (uncomment if using Railway) ---
      # Railway auto-deploys from GitHub — no extra step needed.
      # Just connect the repo in Railway dashboard and push to main.

      # --- Render (uncomment if using Render) ---
      # Render auto-deploys from GitHub — no extra step needed.
      # Connect the repo in Render dashboard; set build command and start command below.
      # Build command:  cd client && npm ci && npm run build
      # Start command:  node server.js

      # --- Fly.io (uncomment if using Fly.io) ---
      # - name: Deploy to Fly.io
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy notice
        run: echo "Build passed. Connect repo to Railway/Render/Fly.io to auto-deploy."
